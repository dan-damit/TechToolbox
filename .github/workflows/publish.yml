name: Publish to PowerShell Gallery

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish TechToolbox.Agent runtime
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'TechToolbox.Agent.publish'
          if (Test-Path -LiteralPath $publishDir) {
            Remove-Item -LiteralPath $publishDir -Recurse -Force
          }

          dotnet publish .\src\TechToolbox.Agent\TechToolbox.Agent.csproj -c Release -o $publishDir

          $agentDll = Join-Path $publishDir 'TechToolbox.Agent.dll'
          if (-not (Test-Path -LiteralPath $agentDll -PathType Leaf)) {
            throw "TechToolbox.Agent publish did not produce $agentDll"
          }

          "TECH_AGENT_PUBLISH_DIR=$publishDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install PowerShell 7.6.3
        shell: pwsh
        run: |
          $version = '7.6.3'
          $zipPath = Join-Path $env:RUNNER_TEMP "powershell-$version-win-x64.zip"
          $installDir = Join-Path $env:RUNNER_TEMP "powershell-$version"
          $downloadUrl = "https://github.com/PowerShell/PowerShell/releases/download/v$version/PowerShell-$version-win-x64.zip"

          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

          $pwshExe = Join-Path $installDir 'pwsh.exe'
          if (-not (Test-Path -LiteralPath $pwshExe)) {
            throw "PowerShell $version install failed; expected executable not found at $pwshExe"
          }

          "PWSH_76_EXE=$pwshExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          & $pwshExe -NoLogo -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'

      - name: Set PSGallery exclusions
        shell: pwsh
        run: |
          $exclude = @(
            '.venv',
            '.git',
            '.github',
            '.vscode',
            'Out',
            'CodeAnalysis',
            'LogsAndExports',
            'Bin',
            'Build.ps1',
            'TechToolbox.code-workspace',
            'dotnet-tools.json',
            'PSScriptAnalyzerSettings.psd1',
            'VERSIONING.md',
            'CHANGELOG.md',
            'commands.md',
            'Config/build.config.json',
            'AI/memory.json',
            'AI/memory.history.json',
            'src'
          )

          $excludeJson = $exclude | ConvertTo-Json -Compress
          $delimiter = "EOF$([Guid]::NewGuid().ToString('N'))"
          "PSGALLERY_EXCLUDE_JSON<<$delimiter" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $excludeJson | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$delimiter" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Preview PSGallery package contents
        shell: pwsh
        run: |
          $modulePath = $PWD.Path
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_EXCLUDE_JSON)) {
            throw "Missing PSGALLERY_EXCLUDE_JSON environment variable from exclusions step."
          }
          $exclude = @($env:PSGALLERY_EXCLUDE_JSON | ConvertFrom-Json)

          $stagePath = Join-Path $env:RUNNER_TEMP 'TechToolbox-publish-preview'
          if (Test-Path -LiteralPath $stagePath) {
            Remove-Item -LiteralPath $stagePath -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stagePath -Force | Out-Null

          $topLevelExclude = $exclude | Where-Object { $_ -notmatch '[\\/]' }

          Get-ChildItem -LiteralPath $modulePath -Force | ForEach-Object {
            if ($topLevelExclude -contains $_.Name) {
              return
            }
            Copy-Item -LiteralPath $_.FullName -Destination $stagePath -Recurse -Force
          }

          foreach ($entry in ($exclude | Where-Object { $_ -match '[\\/]' })) {
            $relativePath = $entry -replace '[\\/]', [System.IO.Path]::DirectorySeparatorChar
            $excludePath = Join-Path $stagePath $relativePath
            if (Test-Path -LiteralPath $excludePath) {
              Remove-Item -LiteralPath $excludePath -Recurse -Force
            }
          }

          if ([string]::IsNullOrWhiteSpace($env:TECH_AGENT_PUBLISH_DIR)) {
            throw "Missing TECH_AGENT_PUBLISH_DIR environment variable from publish step."
          }

          if (-not (Test-Path -LiteralPath $env:TECH_AGENT_PUBLISH_DIR -PathType Container)) {
            throw "Published TechToolbox.Agent runtime directory not found: $env:TECH_AGENT_PUBLISH_DIR"
          }

          $agentRuntimePath = Join-Path $stagePath 'AgentRuntime\TechToolbox.Agent'
          New-Item -ItemType Directory -Path $agentRuntimePath -Force | Out-Null
          Copy-Item -Path (Join-Path $env:TECH_AGENT_PUBLISH_DIR '*') -Destination $agentRuntimePath -Recurse -Force

          $files = Get-ChildItem -LiteralPath $stagePath -Recurse -File |
            ForEach-Object {
              $_.FullName.Substring($stagePath.Length + 1).Replace('\\', '/')
            } |
            Sort-Object

          Write-Host 'Preview of files to be published:'
          $files | ForEach-Object { Write-Host " - $_" }
          Write-Host "Total files: $($files.Count)"

      - name: Publish Module to PSGallery
        shell: pwsh
        env:
          NUGET_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:NUGET_KEY)) {
            throw "Missing PSGALLERY_API_KEY secret. Set repository secret 'PSGALLERY_API_KEY' and re-run."
          }

          if ([string]::IsNullOrWhiteSpace($env:PWSH_76_EXE)) {
            throw "Missing PWSH_76_EXE environment variable from install step."
          }

          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_EXCLUDE_JSON)) {
            throw "Missing PSGALLERY_EXCLUDE_JSON environment variable from exclusions step."
          }

          if (-not (Test-Path -LiteralPath $env:PWSH_76_EXE)) {
            throw "PowerShell 7.6.3 executable not found: $env:PWSH_76_EXE"
          }

          if ([string]::IsNullOrWhiteSpace($env:GITHUB_REF_NAME)) {
            throw "Missing GITHUB_REF_NAME; expected a tag like v0.5.32."
          }

          if ($env:GITHUB_REF_NAME -notmatch '^v') {
            throw "Tag '$($env:GITHUB_REF_NAME)' does not start with 'v'. Expected format v<semver>."
          }

          $tagVersion = $env:GITHUB_REF_NAME.Substring(1)
          if ([string]::IsNullOrWhiteSpace($tagVersion)) {
            throw "Could not parse version from tag '$($env:GITHUB_REF_NAME)'."
          }

          $sourceManifestPath = Join-Path $PWD.Path 'TechToolbox.psd1'
          if (-not (Test-Path -LiteralPath $sourceManifestPath)) {
            throw "Module manifest not found at $sourceManifestPath"
          }

          $sourceManifestData = Import-PowerShellDataFile -Path $sourceManifestPath
          $manifestVersion = [string]$sourceManifestData.ModuleVersion
          if ([string]::IsNullOrWhiteSpace($manifestVersion)) {
            throw "ModuleVersion is missing from $sourceManifestPath"
          }

          if ($manifestVersion -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match manifest ModuleVersion '$manifestVersion'."
          }

          Write-Host "Publishing TechToolbox to PowerShell Gallery with $env:PWSH_76_EXE..."
          Write-Host "Validated tag and manifest version: $tagVersion"

          $publishScriptPath = Join-Path $env:RUNNER_TEMP 'publish-module.ps1'
          @'
          param(
            [Parameter(Mandatory)]
            [string]$ModulePath,
            [Parameter(Mandatory)]
            [string]$NuGetKey,
            [Parameter(Mandatory)]
            [string]$ExcludeJson,
            [Parameter(Mandatory)]
            [string]$ExpectedVersion,
            [Parameter(Mandatory)]
            [string]$AgentPublishDir
          )

          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $true
          }

          $exclude = @($ExcludeJson | ConvertFrom-Json)

          $stageRoot = Join-Path ([System.IO.Path]::GetTempPath()) ("TechToolbox-publish-" + [Guid]::NewGuid().ToString('N'))
          $stagePath = Join-Path $stageRoot 'TechToolbox'
          New-Item -ItemType Directory -Path $stagePath -Force | Out-Null

          $topLevelExclude = $exclude | Where-Object { $_ -notmatch '[\\/]' }
          Get-ChildItem -LiteralPath $ModulePath -Force | ForEach-Object {
            if ($topLevelExclude -contains $_.Name) {
              return
            }
            Copy-Item -LiteralPath $_.FullName -Destination $stagePath -Recurse -Force
          }

          foreach ($entry in ($exclude | Where-Object { $_ -match '[\\/]' })) {
            $relativePath = $entry -replace '[\\/]', [System.IO.Path]::DirectorySeparatorChar
            $excludePath = Join-Path $stagePath $relativePath
            if (Test-Path -LiteralPath $excludePath) {
              Remove-Item -LiteralPath $excludePath -Recurse -Force
            }
          }

          if (-not (Test-Path -LiteralPath $AgentPublishDir -PathType Container)) {
            throw "Published TechToolbox.Agent runtime directory not found: $AgentPublishDir"
          }

          $agentRuntimePath = Join-Path $stagePath 'AgentRuntime\TechToolbox.Agent'
          New-Item -ItemType Directory -Path $agentRuntimePath -Force | Out-Null
          Copy-Item -Path (Join-Path $AgentPublishDir '*') -Destination $agentRuntimePath -Recurse -Force

          $manifest = Join-Path $stagePath "TechToolbox.psd1"

          # Normalize gallery tags to avoid invalid values with whitespace (for example, "active directory").
          $manifestData = Import-PowerShellDataFile -Path $manifest
          $psData = [ordered]@{}
          if ($manifestData.PrivateData -and $manifestData.PrivateData.PSData) {
            $psData = [ordered]@{} + $manifestData.PrivateData.PSData
          }

          if (($psData.Keys -contains 'Tags') -and $null -ne $psData.Tags) {
            $normalizedTags = @(
              $psData.Tags | ForEach-Object {
                if ($_ -is [string]) {
                  ($_ -replace '\s+', '-').Trim('-')
                }
                else {
                  $_
                }
              }
            ) | Where-Object { -not [string]::IsNullOrWhiteSpace([string]$_) } | Select-Object -Unique

            $psData['Tags'] = $normalizedTags
            Update-ModuleManifest -Path $manifest -PrivateData ([ordered]@{ PSData = $psData })
            Write-Host ("Normalized manifest tags for publish: {0}" -f ($normalizedTags -join ', '))
          }

          Test-ModuleManifest $manifest

          try {
            Publish-Module `
              -Path $stagePath `
              -NuGetApiKey $NuGetKey `
              -Repository PSGallery `
              -Verbose

            $maxAttempts = 24
            $delaySeconds = 15
            $published = $false

            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              Write-Host ("Checking PSGallery for TechToolbox version {0} (attempt {1}/{2})..." -f $ExpectedVersion, $attempt, $maxAttempts)

              $galleryVersions = @(
                Find-Module -Name 'TechToolbox' -Repository 'PSGallery' -AllVersions -ErrorAction Stop |
                  Select-Object -ExpandProperty Version |
                  ForEach-Object { $_.ToString() }
              )

              if ($galleryVersions -contains $ExpectedVersion) {
                Write-Host ("Verified PSGallery now shows TechToolbox {0}." -f $ExpectedVersion)
                $published = $true
                break
              }

              if ($attempt -lt $maxAttempts) {
                Start-Sleep -Seconds $delaySeconds
              }
            }

            if (-not $published) {
              throw ("Publish completed but PSGallery did not reflect TechToolbox {0} within {1} seconds." -f $ExpectedVersion, ($maxAttempts * $delaySeconds))
            }
          }
          finally {
            if (Test-Path -LiteralPath $stageRoot) {
              Remove-Item -LiteralPath $stageRoot -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
          '@ | Set-Content -LiteralPath $publishScriptPath -Encoding UTF8

          $modulePath = $PWD.Path
          & $env:PWSH_76_EXE -NoLogo -NoProfile -File $publishScriptPath -ModulePath $modulePath -NuGetKey $env:NUGET_KEY -ExcludeJson $env:PSGALLERY_EXCLUDE_JSON -ExpectedVersion $tagVersion -AgentPublishDir $env:TECH_AGENT_PUBLISH_DIR
