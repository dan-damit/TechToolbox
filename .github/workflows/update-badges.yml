name: Update Badges

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 * * * *" # every hour
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-badges:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install PowerShellGet (for Find-Module)
        run: Install-Module PowerShellGet -Force -Scope CurrentUser
        shell: pwsh

      - name: Build badges
        run: pwsh ./assets/badges/build-badges.ps1

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/badges/*.svg
          git diff --cached --quiet || git commit -m "Auto-update badges"
        shell: bash

      - name: Push
        run: |
          set -euo pipefail

          # Remote main can advance between checkout and push; rebase and retry.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed due to concurrent updates; retrying..."
            git rebase --abort || true
          done

          echo "Failed to push badge updates after 3 attempts."
          exit 1
        shell: bash
