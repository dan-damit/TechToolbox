  <rect x="6" y="6" width="60" height="2" fill="url(#accent)" opacity="0.8"/>
  <rect x="30" y="10" width="22" height="1" fill="#7c3aed" opacity="0.6"/>

  <g font-family="Consolas, Menlo, monospace" font-size="12">
